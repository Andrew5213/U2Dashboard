<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Assistente IA — U2 Broadcast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/echarts.min.js"></script>
  <link rel="stylesheet" href="/static/mobile.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f1f5f9;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>
</head>
<body>

  <!-- ═══ HEADER ═══ -->
  <header class="mob-header" style="flex-shrink:0;">
    <button class="mob-menu-btn" aria-label="Abrir menu" onclick="openMenu()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
      </svg>
    </button>
    <div style="flex:1; overflow:hidden;">
      <div class="mob-header-title">Assistente U2</div>
      <div style="font-size:10px;color:#6b7280;margin-top:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">Powered by Claude Haiku</div>
    </div>
    <button id="mob-chat-clear" class="mob-header-action">Limpar</button>
  </header>

  <!-- ═══ CHAT SCROLL ═══ -->
  <div class="mob-chat-scroll" id="mob-chat-scroll">

    <!-- Welcome -->
    <div id="mob-chat-welcome">
      <div class="mob-welcome-icon">
        <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/>
        </svg>
      </div>
      <div>
        <p class="mob-welcome-title">Como posso ajudar?</p>
        <p class="mob-welcome-sub">Pergunte sobre o progresso das províncias, tarefas atrasadas, equipe e muito mais.</p>
      </div>
      <div class="mob-suggestions">
        <button class="mob-suggestion" data-query="Qual o resumo geral do projeto?">
          <span class="mob-suggestion-icon">📊</span>
          <span>Resumo geral do projeto</span>
        </button>
        <button class="mob-suggestion" data-query="Compare o progresso de todas as províncias">
          <span class="mob-suggestion-icon">🗺️</span>
          <span>Progresso das províncias</span>
        </button>
        <button class="mob-suggestion" data-query="Quais tarefas estão atrasadas?">
          <span class="mob-suggestion-icon">⚠️</span>
          <span>Tarefas atrasadas</span>
        </button>
        <button class="mob-suggestion" data-query="O que vence nos próximos 30 dias?">
          <span class="mob-suggestion-icon">📅</span>
          <span>Vence em 30 dias</span>
        </button>
        <button class="mob-suggestion" data-query="Quem tem mais tarefas em aberto?">
          <span class="mob-suggestion-icon">👥</span>
          <span>Equipe e tarefas</span>
        </button>
        <button class="mob-suggestion" data-query="Mostre a evolução do progresso das províncias">
          <span class="mob-suggestion-icon">📈</span>
          <span>Evolução do progresso</span>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div id="mob-chat-messages" class="hidden"></div>

  </div>

  <!-- ═══ INPUT BAR ═══ -->
  <div class="mob-input-bar">
    <div class="mob-input-row">
      <textarea id="mob-chat-input" rows="1" placeholder="Pergunte sobre províncias, tarefas…"></textarea>
      <button id="mob-chat-send">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5">

        </svg>
      </button>
    </div>

  <script>
  (() => {
    const STORAGE_KEY = 'u2chat_page_history'; // mesma chave do desktop para histórico compartilhado
    const MAX_HISTORY = 60;
    let _msgIndex = 0;
    const _charts = {};

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function mdToHtml(text) {
      const safe = String(text ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      function inline(s) {
        return s
          .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/\*(.+?)\*/g,'<em>$1</em>')
          .replace(/`([^`]+)`/g,'<code style="background:#f1f5f9;padding:1px 5px;border-radius:3px;font-size:11px;font-family:monospace">$1</code>');
      }
      const lines = safe.split('\n');
      const out = [];
      let listItems = [];
      function flushList() {
        if (!listItems.length) return;
        out.push('<ul style="margin:5px 0 5px 16px;list-style:disc">' +
          listItems.map(li => `<li style="margin:3px 0">${li}</li>`).join('') + '</ul>');
        listItems = [];
      }
      for (const line of lines) {
        if (/^#{1,3} /.test(line)) {
          flushList();
          const level = line.match(/^(#+)/)[1].length;
          const sz = level === 1 ? '14px' : level === 2 ? '13px' : '12.5px';
          out.push(`<div style="font-weight:700;font-size:${sz};margin:10px 0 3px;color:#0f172a">${inline(line.replace(/^#+\s/, ''))}</div>`);
        } else if (/^[-*] /.test(line)) {
          listItems.push(inline(line.slice(2)));
        } else if (line.trim() === '') {
          flushList();
          out.push('<div style="height:4px"></div>');
        } else {
          flushList();
          out.push(`<div style="margin:2px 0">${inline(line)}</div>`);
        }
      }
      flushList();
      return out.join('');
    }

    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }
    function saveHistory(msgs) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs.slice(-MAX_HISTORY))); } catch {}
    }

    function disposeChart(id) {
      if (_charts[id]) { try { _charts[id].dispose(); } catch {} delete _charts[id]; }
    }

    function renderChart(container, chart, chartId) {
      if (!chart?.type) return;

      if (chart.type === 'kpi') {
        const grid = document.createElement('div');
        grid.className = 'mob-kpi-grid-chat';
        (chart.data || []).forEach(item => {
          const card = document.createElement('div');
          card.className = 'mob-kpi-card-chat';
          card.innerHTML = `<div class="mob-kpi-value-chat">${esc(String(item.value))}</div><div class="mob-kpi-label-chat">${esc(item.label)}</div>`;
          grid.appendChild(card);
        });
        container.appendChild(grid);
        return;
      }

      if (chart.type === 'table') {
        const d = chart.data || {};
        const headers = d.headers || [];
        const rows = d.rows || [];
        const wrap = document.createElement('div');
        wrap.className = 'mob-chat-table-wrap';
        let html = '<table class="mob-chat-table">';
        html += '<thead><tr>' + headers.map(h => `<th>${esc(h)}</th>`).join('') + '</tr></thead>';
        html += '<tbody>' + rows.map(row =>
          `<tr>${row.map(c => `<td>${esc(String(c ?? ''))}</td>`).join('')}</tr>`
        ).join('') + '</tbody></table>';
        wrap.innerHTML = html;
        container.appendChild(wrap);
        return;
      }

      // ECharts: bar / pie / line
      // Calcular altura dinâmica antes de inserir no DOM
      const cats = chart.type === 'bar' ? (chart.data?.categories || []) : [];
      const isHoriz = chart.type === 'bar' && (cats.length > 5 || cats.some(c => c.length > 10));
      let chartHeight = 240;
      if (isHoriz) chartHeight = Math.max(240, cats.length * 28 + 80);
      else if (chart.type === 'line') chartHeight = 260;

      const el = document.createElement('div');
      el.className = 'mob-chart-canvas';
      el.style.height = chartHeight + 'px';
      container.appendChild(el);
      disposeChart(chartId);

      // Duplo rAF: garante que o browser calculou o layout antes do ECharts ler as dimensões
      requestAnimationFrame(() => requestAnimationFrame(() => {
        const inst = echarts.init(el, '', { renderer: 'canvas' });
        _charts[chartId] = inst;

        const hasTitle = !!(chart.title || '').trim();
        let opt = {
          tooltip: { trigger: chart.type === 'pie' ? 'item' : 'axis' },
          animation: false,
        };
        if (hasTitle) opt.title = { text: chart.title, textStyle: { fontSize: 12, fontWeight: 600, color: '#1e293b' } };

        if (chart.type === 'pie') {
          opt.series = [{ type: 'pie', radius: ['35%', '65%'], data: chart.data || [], label: { fontSize: 10 } }];
          opt.legend = { orient: 'vertical', right: '5%', top: 'center', textStyle: { fontSize: 10 } };
        }

        if (chart.type === 'bar') {
          const d = chart.data || {};
          const series = (d.series || []).map(s => ({
            name: s.name, type: 'bar', data: s.data,
            stack: d.stacked ? 'total' : undefined, barMaxWidth: 32,
          }));
          const topSpace = hasTitle ? 36 : 10;
          if (isHoriz) {
            opt.xAxis = { type: 'value', axisLabel: { fontSize: 9 } };
            opt.yAxis = { type: 'category', data: cats, axisLabel: { fontSize: 9, width: 100, overflow: 'truncate' } };
            opt.grid = { left: 110, right: 40, top: topSpace, bottom: 12 };
          } else {
            opt.xAxis = { type: 'category', data: cats, axisLabel: { fontSize: 9, rotate: 30 } };
            opt.yAxis = { type: 'value', axisLabel: { fontSize: 9, formatter: v => `${v}%` } };
            opt.grid = { left: 40, right: 16, top: topSpace, bottom: 44 };
          }
          opt.series = series;
          if (d.stacked) opt.legend = { bottom: 4, textStyle: { fontSize: 9 } };
        }

        if (chart.type === 'line') {
          const seriesData = chart.data?.series || [];
          const allDates = [...new Set(seriesData.flatMap(s => (s.points || []).map(p => p.date)))].sort();
          opt.xAxis = { type: 'category', data: allDates, axisLabel: { fontSize: 9, rotate: 30 } };
          opt.yAxis = { type: 'value', min: 0, max: 100, axisLabel: { fontSize: 9, formatter: v => `${v}%` } };
          opt.grid = { left: 40, right: 16, top: hasTitle ? 36 : 10, bottom: 56 };
          opt.legend = { bottom: 4, textStyle: { fontSize: 9 } };
          opt.series = seriesData.map(s => {
            const map = Object.fromEntries((s.points || []).map(p => [p.date, p.value]));
            return { name: s.name, type: 'line', smooth: true, symbol: 'none', data: allDates.map(d => map[d] ?? null), connectNulls: false };
          });
        }

        inst.setOption(opt);
        inst.resize();
        window.addEventListener('resize', () => inst.resize());

        // Scroll para mostrar o gráfico recém-renderizado
        const scroll = document.getElementById('mob-chat-scroll');
        if (scroll) setTimeout(() => { scroll.scrollTop = scroll.scrollHeight; }, 60);
      }));
    }

    function appendMessage(role, text, chart, save = true) {
      const id = ++_msgIndex;
      const isUser = role === 'user';
      const msgs = document.getElementById('mob-chat-messages');
      const welcome = document.getElementById('mob-chat-welcome');
      if (welcome) welcome.style.display = 'none';
      msgs.classList.remove('hidden');

      const wrap = document.createElement('div');
      wrap.className = `mob-msg-wrap${isUser ? ' mob-msg-user' : ''}`;

      if (!isUser) {
        const avatar = document.createElement('div');
        avatar.className = 'mob-avatar';
        avatar.innerHTML = `<svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/></svg>`;
        wrap.appendChild(avatar);
      }

      const bubble = document.createElement('div');
      bubble.className = `mob-bubble ${isUser ? 'mob-bubble-user' : 'mob-bubble-bot'}`;
      const textDiv = document.createElement('div');
      textDiv.innerHTML = isUser ? esc(text).replace(/\n/g, '<br>') : mdToHtml(text);
      bubble.appendChild(textDiv);
      wrap.appendChild(bubble);
      msgs.appendChild(wrap);

      const scroll = document.getElementById('mob-chat-scroll');
      scroll.scrollTop = scroll.scrollHeight;

      if (!isUser && chart) renderChart(bubble, chart, `mob-${id}`);

      if (save) {
        const history = loadHistory();
        history.push({ role, text, chart: chart || null });
        saveHistory(history);
      }
    }

    function showTyping() {
      const el = document.createElement('div');
      el.id = 'mob-typing';
      el.className = 'mob-msg-wrap';
      el.innerHTML = `<div class="mob-avatar"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z"/></svg></div>
      <div class="mob-bubble mob-bubble-bot mob-typing"><span></span><span></span><span></span></div>`;
      const msgs = document.getElementById('mob-chat-messages');
      msgs.appendChild(el);
      document.getElementById('mob-chat-scroll').scrollTop = 99999;
    }

    function removeTyping() { document.getElementById('mob-typing')?.remove(); }

    async function send(msg) {
      if (!msg) return;
      const input = document.getElementById('mob-chat-input');
      const btn = document.getElementById('mob-chat-send');
      input.value = '';
      input.style.height = 'auto';
      btn.disabled = true;
      appendMessage('user', msg);
      showTyping();
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
        });
        const json = await res.json();
        removeTyping();
        appendMessage('bot', json.text || 'Sem resposta.', json.chart || null);
      } catch {
        removeTyping();
        appendMessage('bot', 'Erro de comunicação. Verifique a conexão e tente novamente.');
      } finally {
        btn.disabled = false;
      }
    }

    function clearHistory() {
      if (!confirm('Limpar todo o histórico de conversa?')) return;
      localStorage.removeItem(STORAGE_KEY);
      const msgs = document.getElementById('mob-chat-messages');
      msgs.innerHTML = '';
      msgs.classList.add('hidden');
      Object.keys(_charts).forEach(disposeChart);
      document.getElementById('mob-chat-welcome').style.display = '';
      _msgIndex = 0;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('mob-chat-input');
      const btn = document.getElementById('mob-chat-send');
      const clearBtn = document.getElementById('mob-chat-clear');
      const chatScroll = document.getElementById('mob-chat-scroll');

      btn.addEventListener('click', () => send(input.value.trim()));
      clearBtn.addEventListener('click', clearHistory);

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input.value.trim()); }
      });
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
      });

      // ── Correção de teclado virtual (iOS / Android) ───────────────
      // body tem position:fixed para não scrollar com a página.
      // visualViewport.offsetTop compensa o "pan" que o iOS aplica ao abrir o teclado.
      // visualViewport.height dá a altura visível (excluindo o teclado).
      function syncViewport() {
        if (!window.visualViewport) return;
        const vv = window.visualViewport;
        document.body.style.height = vv.height + 'px';
        document.body.style.transform = `translateY(${vv.offsetTop}px)`;
      }

      syncViewport();

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
          syncViewport();
          if (document.activeElement === input) {
            setTimeout(() => { chatScroll.scrollTop = chatScroll.scrollHeight; }, 80);
          }
        });
        window.visualViewport.addEventListener('scroll', syncViewport);
      } else {
        window.addEventListener('resize', syncViewport);
      }

      input.addEventListener('blur', () => {
        setTimeout(syncViewport, 150);
      });

      input.addEventListener('focus', () => {
        setTimeout(() => { chatScroll.scrollTop = chatScroll.scrollHeight; }, 400);
      });
      // ─────────────────────────────────────────────────────────────

      document.querySelectorAll('[data-query]').forEach(el => {
        el.addEventListener('click', () => send(el.dataset.query));
      });

      // Restaura histórico
      const history = loadHistory();
      if (history.length > 0) {
        history.forEach(m => appendMessage(m.role, m.text, m.chart || null, false));
      }
    });
  })();

  function showToast(msg, type) {
    const el = document.getElementById('mob-toast');
    const colors = {
      success:'background:#f0fdf4;color:#166534;border:1px solid #bbf7d0',
      error:  'background:#fef2f2;color:#991b1b;border:1px solid #fecaca',
      info:   'background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe',
    };
    el.setAttribute('style', (colors[type]||colors.info)+';display:block');
    el.textContent = msg;
    setTimeout(()=>{ el.style.display='none'; }, 3200);
  }

  // ─── Menu (hambúrguer) + Relatórios (igual às outras páginas) ────────────
  function openMenu() {
    document.getElementById('main-menu').classList.add('open');
    document.getElementById('menu-overlay').classList.add('open');
  }
  function closeMenu() {
    document.getElementById('main-menu').classList.remove('open');
    document.getElementById('menu-overlay').classList.remove('open');
  }

  let _reportLang = 'pt';
  let _provDrawerOpen = false;
  let _provLoaded = false;

  function openDrawer() {
    document.getElementById('reports-drawer').classList.add('open');
    document.getElementById('drawer-overlay').classList.add('open');
  }
  function closeDrawer() {
    document.getElementById('reports-drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
  }

  function setReportLang(lang) {
    _reportLang = lang;
    document.getElementById('dlang-pt').className = 'mob-lang-btn '+(lang==='pt'?'active':'idle');
    document.getElementById('dlang-en').className = 'mob-lang-btn '+(lang==='en'?'active':'idle');
  }

  function _exportWithSpinner(btnId, url) {
    const btn = document.getElementById(btnId);
    if (btn) { btn.style.opacity='.5'; btn.disabled=true; }
    const a = document.createElement('a');
    a.href=url; a.download='';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    closeDrawer();
    if (btn) setTimeout(()=>{ btn.style.opacity=''; btn.disabled=false; },5000);
  }

  function exportPDF()     { _exportWithSpinner('btn-pdf-executivo',`/reports/pdf?lang=${_reportLang}`); }
  function exportDiario()  { _exportWithSpinner('btn-pdf-diario',   `/reports/pdf/daily?lang=${_reportLang}`); }
  function exportSemanal() { _exportWithSpinner('btn-pdf-semanal',  `/reports/pdf/weekly?lang=${_reportLang}`); }

  async function toggleProvinciaDrawer() {
    _provDrawerOpen = !_provDrawerOpen;
    const list = document.getElementById('prov-drawer-list');
    const chev = document.getElementById('prov-chevron');
    list.classList.toggle('open', _provDrawerOpen);
    chev.style.transform = _provDrawerOpen?'rotate(180deg)':'';

    if (_provDrawerOpen && !_provLoaded) {
      try {
        const folders = await fetch('/reports/folders').then(r=>r.json());
        list.innerHTML = folders.length
          ? folders.map(f=>`<button class="mob-provincia-btn" onclick="exportProvincia('${f.folder_id}')">${f.name}</button>`).join('')
          : '<div style="padding:10px 8px 10px 56px;font-size:12px;color:#94a3b8">Nenhuma área encontrada</div>';
        _provLoaded = true;
      } catch { list.innerHTML='<div style="padding:10px 8px 10px 56px;font-size:12px;color:#ef4444">Erro ao carregar</div>'; }
    }
  }

  function exportProvincia(folderId) {
    _exportWithSpinner('btn-pdf-provincia',`/reports/pdf/provincia?folder_id=${folderId}&lang=${_reportLang}`);
  }

  async function triggerRefresh() {
    try {
      await fetch('/dashboard/refresh',{method:'POST'});
      showToast('Refresh iniciado! Dados sendo atualizados.','success');
    } catch(e) { showToast('Falha ao disparar refresh: '+e.message,'error'); }
  }
  </script>
</body>
