  <!-- ═══════════════════ CONTEÚDO ═══════════════════ -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="bg-white border-b border-gray-200 flex-shrink-0 h-14 flex items-center px-6 shadow-sm">
      <h1 class="text-sm font-semibold text-gray-700">Documentações</h1>
    </header>

    <main class="flex-1 overflow-auto p-6">
      <div class="max-w-5xl mx-auto space-y-6">

        <!-- Upload -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5">
          <h2 class="text-sm font-semibold text-gray-700 mb-4">Enviar novo documento</h2>
          <form id="upload-form" class="grid grid-cols-1 md:grid-cols-4 gap-3 items-end">
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Província</label>
              <select id="upload-folder" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm">
                <option value="">Carregando...</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Arquivo PDF</label>
              <input id="upload-file" type="file" accept="application/pdf,.pdf" required
                class="w-full text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-medium file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1">Descrição (opcional)</label>
              <input id="upload-description" type="text" maxlength="500"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm" placeholder="Ex: Planta baixa v2" />
            </div>
            <div>
              <button type="submit" id="upload-btn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2 rounded-lg transition-colors">
                Enviar
              </button>
            </div>
          </form>
          <p id="upload-error" class="text-xs text-red-600 mt-2 hidden"></p>
        </div>

        <!-- Lista -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200">
          <div class="flex items-center justify-between p-4 border-b border-gray-200">
            <h2 class="text-sm font-semibold text-gray-700">Documentos enviados</h2>
            <select id="filter-folder" class="border border-gray-300 rounded-lg px-3 py-1.5 text-xs text-gray-600">
              <option value="">Todas as províncias</option>
            </select>
          </div>
          <div id="doc-list" class="divide-y divide-gray-100">
            <div class="px-4 py-6 text-center text-sm text-gray-400">Carregando...</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <div id="toast" class="fixed bottom-5 right-5 z-50 hidden max-w-sm"></div>

  <script>
    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      toast.className = `fixed bottom-5 right-5 z-50 px-4 py-3 rounded-lg shadow-lg text-sm font-medium ${type === 'error' ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`;
      toast.textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3500);
    }

    // ─── Documentações ──────────────────────────────────────────────────────
    let _docFolders = [];

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function _escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    async function loadDocFolders() {
      try {
        const res = await fetch('/documents/folders');
        _docFolders = await res.json();
        const opts = _docFolders.map(f => `<option value="${f.folder_id}">${_escapeHtml(f.name)}</option>`).join('');
        document.getElementById('upload-folder').innerHTML = '<option value="">Selecione...</option>' + opts;
        document.getElementById('filter-folder').innerHTML = '<option value="">Todas as províncias</option>' + opts;
      } catch (e) {
        document.getElementById('upload-folder').innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    async function loadDocuments() {
      const folderId = document.getElementById('filter-folder').value;
      const url = folderId ? `/documents?folder_id=${folderId}` : '/documents';
      const list = document.getElementById('doc-list');
      list.innerHTML = '<div class="px-4 py-6 text-center text-sm text-gray-400">Carregando...</div>';
      try {
        const res = await fetch(url);
        const docs = await res.json();
        if (!docs.length) {
          list.innerHTML = '<div class="px-4 py-6 text-center text-sm text-gray-400">Nenhum documento enviado ainda</div>';
          return;
        }
        list.innerHTML = docs.map(d => `
          <div class="flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors">
            <svg class="w-8 h-8 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-800 truncate">${_escapeHtml(d.original_filename)}</p>
              <p class="text-xs text-gray-500 truncate">${_escapeHtml(d.folder_name)} · ${fmtSize(d.file_size)} · ${fmtDate(d.uploaded_at)}${d.description ? ' · ' + _escapeHtml(d.description) : ''}</p>
            </div>
            <a href="/documents/${d.id}/download" class="shrink-0 px-3 py-1.5 text-xs font-medium text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">Baixar</a>
            <button onclick="deleteDocument(${d.id})" class="shrink-0 px-3 py-1.5 text-xs font-medium text-red-600 hover:bg-red-50 rounded-lg transition-colors">Excluir</button>
          </div>
        `).join('');
      } catch (e) {
        list.innerHTML = '<div class="px-4 py-6 text-center text-sm text-red-500">Erro ao carregar documentos</div>';
      }
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const folderId = document.getElementById('upload-folder').value;
      const fileInput = document.getElementById('upload-file');
      const description = document.getElementById('upload-description').value;
      const errorEl = document.getElementById('upload-error');
      errorEl.classList.add('hidden');

      if (!folderId || !fileInput.files.length) return;

      const file = fileInput.files[0];
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        errorEl.textContent = 'Apenas arquivos PDF são permitidos.';
        errorEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      const formData = new FormData();
      formData.append('folder_id', folderId);
      formData.append('file', file);
      if (description) formData.append('description', description);

      try {
        const res = await fetch('/documents', { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || 'Falha ao enviar documento');
        }
        document.getElementById('upload-form').reset();
        showToast('Documento enviado com sucesso!');
        loadDocuments();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar';
      }
    });

    async function deleteDocument(id) {
      const password = prompt('Digite a senha para excluir este documento:');
      if (password === null) return;
      try {
        const res = await fetch(`/documents/${id}`, {
          method: 'DELETE',
          headers: { 'X-Delete-Password': password },
        });
        if (res.status === 403) {
          showToast('Senha incorreta.', 'error');
          return;
        }
        if (!res.ok) throw new Error('Falha ao excluir');
        showToast('Documento excluído.');
        loadDocuments();
      } catch (e) {
        showToast('Erro ao excluir documento: ' + e.message, 'error');
      }
    }

    document.getElementById('filter-folder').addEventListener('change', loadDocuments);

    loadDocFolders().then(loadDocuments);

    // ─── Sidebar: Relatórios do espaço + Atualizar Cache (igual às outras páginas) ──
    function _exportWithSpinner(btnId, url) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin inline mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>Gerando...';
      btn.disabled = true;
      const a = document.createElement('a');
      a.href = url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 6000);
    }

    let _reportLang = 'pt';
    function setReportLang(lang) {
      _reportLang = lang;
      const active = 'px-2 py-0.5 text-xs rounded font-semibold transition-colors bg-blue-600 text-white';
      const idle = 'px-2 py-0.5 text-xs rounded font-semibold transition-colors text-gray-400 hover:text-white';
      document.getElementById('lang-pt').className = lang === 'pt' ? active : idle;
      document.getElementById('lang-en').className = lang === 'en' ? active : idle;
    }

    function exportPDF() { _exportWithSpinner('btn-pdf-executivo', `/reports/pdf?lang=${_reportLang}`); }
    function exportDiario() { _exportWithSpinner('btn-pdf-diario', `/reports/pdf/daily?lang=${_reportLang}`); }
    function exportSemanal() { _exportWithSpinner('btn-pdf-semanal', `/reports/pdf/weekly?lang=${_reportLang}`); }

    // ─── Exportação em .xlsx (mesmos dados, formato planilha) ──────────────────
    function _exportCompact(btnId, url) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      const orig = btn.textContent;
      btn.textContent = '...';
      btn.disabled = true;
      const a = document.createElement('a');
      a.href = url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 4000);
    }

    function exportPDFXlsx() { _exportCompact('btn-xlsx-executivo', `/reports/xlsx?lang=${_reportLang}`); }
    function exportDiarioXlsx() { _exportCompact('btn-xlsx-diario', `/reports/xlsx/daily?lang=${_reportLang}`); }
    function exportSemanalXlsx() { _exportCompact('btn-xlsx-semanal', `/reports/xlsx/weekly?lang=${_reportLang}`); }
    function exportProvinciaXlsx(folderId) {
      if (_submenuOpen) toggleProvinciaMenu();
      const a = document.createElement('a');
      a.href = `/reports/xlsx/provincia?folder_id=${folderId}&lang=${_reportLang}`;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    let _provinciasLoaded = false;
    let _submenuOpen = false;

    async function toggleProvinciaMenu() {
      _submenuOpen = !_submenuOpen;
      const submenu = document.getElementById('provincia-submenu');
      const chevron = document.getElementById('provincia-chevron');
      submenu.style.maxHeight = _submenuOpen ? '800px' : '0';
      chevron.style.transform = _submenuOpen ? 'rotate(180deg)' : '';

      if (_submenuOpen && !_provinciasLoaded) {
        try {
          const res = await fetch('/reports/folders');
          const folders = await res.json();
          const list = document.getElementById('provincia-list');
          if (!folders.length) {
            list.innerHTML = '<div class="px-3 py-1.5 text-xs text-gray-500">Nenhuma área encontrada</div>';
          } else {
            list.innerHTML = folders.map(f =>
              `<div class="flex items-center gap-1">
                <button onclick="exportProvincia('${f.folder_id}','${f.name.replace(/'/g, "\\'")}')"
                  class="flex-1 text-left px-3 py-1.5 text-xs text-gray-400 hover:text-white hover:bg-gray-800 rounded transition-colors">
                  ${f.name}
                </button>
                <button onclick="exportProvinciaXlsx('${f.folder_id}')" title="Exportar em Excel (.xlsx)"
                  class="shrink-0 px-1.5 py-1 mr-1 rounded text-[9px] font-bold text-gray-500 hover:bg-gray-800 hover:text-emerald-400 transition-colors">XLS</button>
              </div>`
            ).join('');
          }
          _provinciasLoaded = true;
        } catch (e) {
          document.getElementById('provincia-list').innerHTML =
            '<div class="px-3 py-1.5 text-xs text-red-400">Erro ao carregar</div>';
        }
      }
    }

    function exportProvincia(folderId) {
      if (_submenuOpen) toggleProvinciaMenu();
      _exportWithSpinner('btn-pdf-provincia', `/reports/pdf/provincia?folder_id=${folderId}&lang=${_reportLang}`);
    }

    async function triggerRefresh() {
      const btn = document.getElementById('refresh-btn');
      const lbl = document.getElementById('refresh-label');
      if (btn) btn.disabled = true;
      if (lbl) lbl.textContent = 'Aguarde…';
      try {
        await fetch('/dashboard/refresh', { method: 'POST' });
        showToast('Refresh iniciado! Os dados serão atualizados em breve.');
      } catch (e) {
        showToast('Falha ao disparar refresh: ' + e.message, 'error');
      } finally {
        if (btn) btn.disabled = false;
        if (lbl) lbl.textContent = 'Atualizar Cache';
      }
    }
  </script>
  <script src="/static/sse.js?v=30"></script>
</body>
</html>
