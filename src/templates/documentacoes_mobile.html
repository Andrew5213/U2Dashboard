<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Documentações — U2 Broadcast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/mobile.css" />
</head>
<body class="bg-gray-100" style="padding-top:env(safe-area-inset-top)">

  <!-- ═══ HEADER ═══ -->
  <header class="mob-header">
    <button class="mob-menu-btn" aria-label="Abrir menu" onclick="openMenu()">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
      </svg>
    </button>
    <div class="mob-header-title">Documentações</div>
  </header>

  <!-- ═══ MAIN ═══ -->
  <main class="mob-main">

    <!-- Upload -->
    <div class="mob-table-wrap" style="padding:14px">
      <div class="mob-section-title" style="margin-top:0">Enviar novo documento</div>
      <form id="upload-form">
        <label class="mob-field-label" for="upload-folder">Província</label>
        <select id="upload-folder" class="mob-select" required>
          <option value="">Carregando...</option>
        </select>

        <label class="mob-field-label" for="upload-file">Arquivo PDF</label>
        <input id="upload-file" type="file" accept="application/pdf,.pdf" class="mob-file-input" required />

        <label class="mob-field-label" for="upload-description">Descrição (opcional)</label>
        <input id="upload-description" type="text" maxlength="500" class="mob-input" placeholder="Ex: Planta baixa v2" />

        <button type="submit" id="upload-btn" class="mob-btn-primary">Enviar</button>
      </form>
      <p id="upload-error" class="mob-field-error hidden"></p>
    </div>

    <!-- Filtro -->
    <label class="mob-field-label" for="filter-folder">Filtrar por província</label>
    <select id="filter-folder" class="mob-select" style="margin-bottom:14px">
      <option value="">Todas as províncias</option>
    </select>

    <!-- Lista -->
    <div class="mob-section-title">Documentos enviados</div>
    <div id="doc-list">
      <div class="mob-loading" style="padding:32px 0">
        <div class="mob-spinner"></div>
        <span style="font-size:13px">Carregando…</span>
      </div>
    </div>

  </main>

  <div id="mob-toast"></div>

  <!-- ══ REPORTS DRAWER ══════════════════════════════════════════ -->
  <div class="mob-drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
  <div class="mob-drawer" id="reports-drawer">
    <div class="mob-drawer-handle"></div>
    <div class="mob-drawer-title">Relatórios</div>
    <div class="mob-drawer-body">

      <!-- Lang toggle -->
      <div class="mob-drawer-lang">
        <span>Idioma:</span>
        <button id="dlang-pt" class="mob-lang-btn active" onclick="setReportLang('pt')">PT</button>
        <button id="dlang-en" class="mob-lang-btn idle"   onclick="setReportLang('en')">EN</button>
      </div>

      <!-- PDF Diário -->
      <button class="mob-drawer-item" id="btn-pdf-diario" onclick="exportDiario()">
        <span class="mob-drawer-item-icon" style="background:#fef3c7">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#d97706" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
          </svg>
        </span>
        <div>
          <div>PDF Diário</div>
          <div style="font-size:11px;color:#94a3b8;font-weight:400">Atualizações de ontem e hoje</div>
        </div>
      </button>

      <!-- PDF Semanal -->
      <button class="mob-drawer-item" id="btn-pdf-semanal" onclick="exportSemanal()">
        <span class="mob-drawer-item-icon" style="background:#ecfdf5">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#16a34a" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5" />
          </svg>
        </span>
        <div>
          <div>PDF Semanal</div>
          <div style="font-size:11px;color:#94a3b8;font-weight:400">Resumo dos últimos 7 dias</div>
        </div>
      </button>

      <!-- PDF Executivo -->
      <button class="mob-drawer-item" id="btn-pdf-executivo" onclick="exportPDF()">
        <span class="mob-drawer-item-icon" style="background:#eff6ff">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#1e40af" stroke-width="1.75">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
        </span>
        <div>
          <div>PDF Executivo</div>
          <div style="font-size:11px;color:#94a3b8;font-weight:400">Relatório completo do espaço</div>
        </div>
      </button>

      <!-- PDF Província (expansível) -->
      <button class="mob-drawer-item" id="btn-pdf-provincia" onclick="toggleProvinciaDrawer()">
        <span class="mob-drawer-item-icon" style="background:#f5f3ff">

          </svg>

          <div>PDF por Província</div>
          <div style="font-size:11px;color:#94a3b8;font-weight:400">Selecione uma área</div>
        </div>

  <script>
    function showToast(msg, type) {
      const el = document.getElementById('mob-toast');
      const colors = {
        success:'background:#f0fdf4;color:#166534;border:1px solid #bbf7d0',
        error:  'background:#fef2f2;color:#991b1b;border:1px solid #fecaca',
        info:   'background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe',
      };
      el.setAttribute('style', (colors[type]||colors.info)+';display:block');
      el.textContent = msg;
      setTimeout(()=>{ el.style.display='none'; }, 3200);
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    async function loadDocFolders() {
      try {
        const res = await fetch('/documents/folders');
        const folders = await res.json();
        const opts = folders.map(f => `<option value="${f.folder_id}">${esc(f.name)}</option>`).join('');
        document.getElementById('upload-folder').innerHTML = '<option value="">Selecione...</option>' + opts;
        document.getElementById('filter-folder').innerHTML = '<option value="">Todas as províncias</option>' + opts;
      } catch (e) {
        document.getElementById('upload-folder').innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    async function loadDocuments() {
      const folderId = document.getElementById('filter-folder').value;
      const url = folderId ? `/documents?folder_id=${folderId}` : '/documents';
      const list = document.getElementById('doc-list');
      list.innerHTML = '<div class="mob-loading" style="padding:32px 0"><div class="mob-spinner"></div><span style="font-size:13px">Carregando…</span></div>';
      try {
        const res = await fetch(url);
        const docs = await res.json();
        if (!docs.length) {
          list.innerHTML = '<div style="text-align:center;padding:32px 0;font-size:12px;color:#94a3b8">Nenhum documento enviado ainda</div>';
          return;
        }
        list.innerHTML = docs.map(d => `
          <div class="mob-doc-card">
            <div class="mob-doc-card-header">
              <svg class="mob-doc-icon" width="28" height="28" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>
              <div class="mob-doc-info">
                <div class="mob-doc-name">${esc(d.original_filename)}</div>
                <div class="mob-doc-meta">${esc(d.folder_name)} · ${fmtSize(d.file_size)} · ${fmtDate(d.uploaded_at)}${d.description ? ' · ' + esc(d.description) : ''}</div>
              </div>
            </div>
            <div class="mob-doc-actions">
              <button type="button" class="mob-doc-btn mob-doc-btn-download" data-download-id="${d.id}" data-filename="${esc(d.original_filename)}">Baixar</button>
              <button onclick="deleteDocument(${d.id})" class="mob-doc-btn mob-doc-btn-delete">Excluir</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        list.innerHTML = '<div style="text-align:center;padding:32px 0;font-size:12px;color:#ef4444">Erro ao carregar documentos</div>';
      }
    }

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const folderId = document.getElementById('upload-folder').value;
      const fileInput = document.getElementById('upload-file');
      const description = document.getElementById('upload-description').value;
      const errorEl = document.getElementById('upload-error');
      errorEl.classList.add('hidden');

      if (!folderId || !fileInput.files.length) return;

      const file = fileInput.files[0];
      if (!file.name.toLowerCase().endsWith('.pdf')) {
        errorEl.textContent = 'Apenas arquivos PDF são permitidos.';
        errorEl.classList.remove('hidden');
        return;
      }

      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      const formData = new FormData();
      formData.append('folder_id', folderId);
      formData.append('file', file);
      if (description) formData.append('description', description);

      try {
        const res = await fetch('/documents', { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || 'Falha ao enviar documento');
        }
        document.getElementById('upload-form').reset();
        showToast('Documento enviado com sucesso!', 'success');
        loadDocuments();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Enviar';
      }
    });

    async function deleteDocument(id) {
      const password = prompt('Digite a senha para excluir este documento:');
      if (password === null) return;
      try {
        const res = await fetch(`/documents/${id}`, {
          method: 'DELETE',
          headers: { 'X-Delete-Password': password },
        });
        if (res.status === 403) {
          showToast('Senha incorreta.', 'error');
          return;
        }
        if (!res.ok) throw new Error('Falha ao excluir');
        showToast('Documento excluído.', 'success');
        loadDocuments();
      } catch (e) {
        showToast('Erro ao excluir documento: ' + e.message, 'error');
      }
    }

    // Baixa via blob em vez de navegar direto para a URL: navegadores mobile
    // (principalmente iOS/Safari e alguns webviews) costumam abrir PDF inline
    // e ignoram o header Content-Disposition: attachment em navegação de página.
    // No iOS/Safari, clicar num <a download> de blob: URL costuma cair no share
    // sheet nativo — e esse share sheet, sem Web Share API, inclui a URL da
    // página junto do arquivo. Por isso preferimos navigator.share() com um
    // File explícito (só files, sem title/text/url) quando disponível: isso
    // garante que só o PDF apareça no compartilhamento, nunca um link.
    async function downloadDocument(id, filename, btn) {
      const orig = btn.textContent;
      btn.textContent = '...';
      btn.disabled = true;
      try {
        const res = await fetch(`/documents/${id}/download`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const blob = await res.blob();
        const file = new File([blob], filename, { type: 'application/pdf' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file] });
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
      } catch (e) {
        if (e.name === 'AbortError') return; // usuário cancelou o compartilhamento
        showToast('Erro ao baixar documento: ' + e.message, 'error');
      } finally {
        btn.textContent = orig;
        btn.disabled = false;
      }
    }

    document.getElementById('doc-list').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-download-id]');
      if (!btn) return;
      downloadDocument(btn.dataset.downloadId, btn.dataset.filename, btn);
    });

    document.getElementById('filter-folder').addEventListener('change', loadDocuments);

    loadDocFolders().then(loadDocuments);

    // ─── Menu (hambúrguer) + Relatórios (igual às outras páginas) ──────────
    function openMenu() {
      document.getElementById('main-menu').classList.add('open');
      document.getElementById('menu-overlay').classList.add('open');
    }
    function closeMenu() {
      document.getElementById('main-menu').classList.remove('open');
      document.getElementById('menu-overlay').classList.remove('open');
    }

    let _reportLang = 'pt';
    let _provDrawerOpen = false;
    let _provLoaded = false;

    function openDrawer() {
      document.getElementById('reports-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('reports-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('open');
    }

    function setReportLang(lang) {
      _reportLang = lang;
      document.getElementById('dlang-pt').className = 'mob-lang-btn '+(lang==='pt'?'active':'idle');
      document.getElementById('dlang-en').className = 'mob-lang-btn '+(lang==='en'?'active':'idle');
    }

    function _exportWithSpinner(btnId, url) {
      const btn = document.getElementById(btnId);
      if (btn) { btn.style.opacity='.5'; btn.disabled=true; }
      const a = document.createElement('a');
      a.href=url; a.download='';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      closeDrawer();
      if (btn) setTimeout(()=>{ btn.style.opacity=''; btn.disabled=false; },5000);
    }

    function exportPDF()     { _exportWithSpinner('btn-pdf-executivo',`/reports/pdf?lang=${_reportLang}`); }
    function exportDiario()  { _exportWithSpinner('btn-pdf-diario',   `/reports/pdf/daily?lang=${_reportLang}`); }
    function exportSemanal() { _exportWithSpinner('btn-pdf-semanal',  `/reports/pdf/weekly?lang=${_reportLang}`); }

    async function toggleProvinciaDrawer() {
      _provDrawerOpen = !_provDrawerOpen;
      const list = document.getElementById('prov-drawer-list');
      const chev = document.getElementById('prov-chevron');
      list.classList.toggle('open', _provDrawerOpen);
      chev.style.transform = _provDrawerOpen?'rotate(180deg)':'';

      if (_provDrawerOpen && !_provLoaded) {
        try {
          const folders = await fetch('/reports/folders').then(r=>r.json());
          list.innerHTML = folders.length
            ? folders.map(f=>`<button class="mob-provincia-btn" onclick="exportProvincia('${f.folder_id}')">${f.name}</button>`).join('')
            : '<div style="padding:10px 8px 10px 56px;font-size:12px;color:#94a3b8">Nenhuma área encontrada</div>';
          _provLoaded = true;
        } catch { list.innerHTML='<div style="padding:10px 8px 10px 56px;font-size:12px;color:#ef4444">Erro ao carregar</div>'; }
      }
    }

    function exportProvincia(folderId) {
      _exportWithSpinner('btn-pdf-provincia',`/reports/pdf/provincia?folder_id=${folderId}&lang=${_reportLang}`);
    }

    async function triggerRefresh() {
      try {
        await fetch('/dashboard/refresh',{method:'POST'});
        showToast('Refresh iniciado! Dados sendo atualizados.','success');
      } catch(e) { showToast('Falha ao disparar refresh: '+e.message,'error'); }
    }
  </script>
</body>
</html>
