<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U2 Broadcast — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/echarts.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    /* Submenu de províncias */
    #provincia-submenu {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease;
    }

    #provincia-chevron {
      transition: transform 0.25s ease;
    }
  </style>
</head>

<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

  <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
  <aside class="w-56 flex-shrink-0 bg-gray-900 flex flex-col z-30 h-screen overflow-hidden">

    <!-- Logo -->
    <div class="px-0 py-0 border-b border-gray-700 flex-shrink-0">
      <img src="/img/Logo Branca.png" alt="U2 Broadcast" class="h-36 w-auto" />
    </div>

    <!-- Nav principal -->
    <nav class="flex-1 px-2 py-4 space-y-0.5 overflow-y-auto">

      <!-- Visão Geral -->
      <a href="/"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
        </svg>
        Visão Geral
      </a>

      {% if chat_enabled %}
      <!-- Assistente IA -->
      <a href="/assistente"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
        </svg>
        Assistente IA
      </a>
      {% endif %}

      <!-- Divisor + Obra Civil -->
      <div class="pt-3 pb-1">
        <div class="border-t border-gray-700 mb-3"></div>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-3 mb-2">Obra Civil</p>
      </div>

      <a href="/rdo"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
        RDO Diário
      </a>

      <a href="/progresso-civil"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
        </svg>
        Controle de Progresso
      </a>

      <!-- Divisor + label Relatórios -->
      <div class="pt-3 pb-1">
        <div class="border-t border-gray-700 mb-3"></div>
        <div class="flex items-center justify-between px-3 mb-2">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Relatórios</p>
          <div class="flex items-center gap-0.5 bg-gray-800 rounded p-0.5">
            <button id="lang-pt" onclick="setReportLang('pt')"
              class="px-2 py-0.5 text-xs rounded font-semibold transition-colors bg-blue-600 text-white">PT</button>
            <button id="lang-en" onclick="setReportLang('en')"
              class="px-2 py-0.5 text-xs rounded font-semibold transition-colors text-gray-400 hover:text-white">EN</button>
          </div>
        </div>
      </div>

      <!-- PDF Diário -->
      <div class="flex items-center gap-1">
        <button id="btn-pdf-diario" onclick="exportDiario()"
          class="flex-1 flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium text-left">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
          </svg>
          PDF Diário
        </button>
        <button id="btn-xlsx-diario" onclick="exportDiarioXlsx()" title="Exportar em Excel (.xlsx)" class="shrink-0 px-2 py-2.5 rounded-lg text-[10px] font-bold text-gray-500 hover:bg-gray-800 hover:text-emerald-400 transition-colors">XLS</button>
      </div>

      <!-- PDF Semanal -->
      <div class="flex items-center gap-1">
        <button id="btn-pdf-semanal" onclick="exportSemanal()"
          class="flex-1 flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium text-left">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5m.75-9 3-3 2.148 2.148A12.061 12.061 0 0 1 16.5 7.605" />
          </svg>
          PDF Semanal
        </button>
        <button id="btn-xlsx-semanal" onclick="exportSemanalXlsx()" title="Exportar em Excel (.xlsx)" class="shrink-0 px-2 py-2.5 rounded-lg text-[10px] font-bold text-gray-500 hover:bg-gray-800 hover:text-emerald-400 transition-colors">XLS</button>
      </div>

      <!-- PDF Executivo -->
      <div class="flex items-center gap-1">
        <button id="btn-pdf-executivo" onclick="exportPDF()"
          class="flex-1 flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium text-left">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
          PDF Executivo
        </button>
        <button id="btn-xlsx-executivo" onclick="exportPDFXlsx()" title="Exportar em Excel (.xlsx)" class="shrink-0 px-2 py-2.5 rounded-lg text-[10px] font-bold text-gray-500 hover:bg-gray-800 hover:text-emerald-400 transition-colors">XLS</button>
      </div>

      <!-- PDF Por Província (expansível) -->
      <div>
        <button id="btn-pdf-provincia" onclick="toggleProvinciaMenu()"
          class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium text-left">
          <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c-.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z" />
          </svg>
          <span class="flex-1">PDF Província</span>
          <svg id="provincia-chevron" class="w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="2"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
          </svg>
        </button>
        <div id="provincia-submenu">
          <div id="provincia-list" class="ml-8 mt-1 mb-1 space-y-0.5">
            <div class="px-3 py-1.5 text-xs text-gray-500">Carregando...</div>
          </div>
        </div>
      </div>

      <!-- Divisor + Atualizar -->
      <div class="pt-3">
        <div class="border-t border-gray-700 mb-3"></div>
      </div>

      <button onclick="triggerRefresh()" id="refresh-btn"
        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-gray-300 hover:bg-gray-800 hover:text-white transition-colors text-sm font-medium text-left">
        <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.75" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        <span id="refresh-label">Atualizar Cache</span>
      </button>

    </nav>

    <!-- Rodapé da sidebar: status SSE + última atualização -->
    <div class="px-4 py-3 border-t border-gray-700 flex-shrink-0">
      <div class="flex items-center gap-2 text-xs text-gray-400">
        <span id="sse-dot" class="w-2 h-2 rounded-full bg-gray-600 transition-colors flex-shrink-0"></span>
        <span id="sse-label">offline</span>
      </div>
      <span id="last-refresh" class="text-xs text-gray-500 mt-1 block truncate"></span>
    </div>
  </aside>

  <!-- ═══════════════════ ÁREA DE CONTEÚDO ═══════════════════ -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- Topbar -->
    <header class="bg-white border-b border-gray-200 flex-shrink-0 h-14 flex items-center px-6 shadow-sm">
      <nav id="breadcrumb" class="text-sm text-gray-500"></nav>
    </header>

    <!-- Conteúdo principal -->
    <main class="flex-1 overflow-auto">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
        <div id="view">
          <div class="flex items-center justify-center h-64">
            <div class="flex flex-col items-center gap-3 text-gray-400">
              <svg class="animate-spin w-8 h-8" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
              </svg>
              <span class="text-sm">Carregando dashboard...</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 right-5 z-50 hidden max-w-sm"></div>

  <script src="/static/sse.js?v=30"></script>
  <script src="/static/charts.js?v=30"></script>
  <script src="/static/app.js?v=30"></script>
  <script>
    function _exportWithSpinner(btnId, url) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      const orig = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin inline mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg>Gerando...';
      btn.disabled = true;
      const a = document.createElement('a');
      a.href = url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 6000);
    }

    let _reportLang = 'pt';
    function setReportLang(lang) {
      _reportLang = lang;
      const active = 'px-2 py-0.5 text-xs rounded font-semibold transition-colors bg-blue-600 text-white';
      const idle = 'px-2 py-0.5 text-xs rounded font-semibold transition-colors text-gray-400 hover:text-white';
      document.getElementById('lang-pt').className = lang === 'pt' ? active : idle;
      document.getElementById('lang-en').className = lang === 'en' ? active : idle;
    }

    function exportPDF() { _exportWithSpinner('btn-pdf-executivo', `/reports/pdf?lang=${_reportLang}`); }
    function exportDiario() { _exportWithSpinner('btn-pdf-diario', `/reports/pdf/daily?lang=${_reportLang}`); }
    function exportSemanal() { _exportWithSpinner('btn-pdf-semanal', `/reports/pdf/weekly?lang=${_reportLang}`); }

    // ─── Exportação em .xlsx (mesmos dados, formato planilha) ──────────────────
    function _exportCompact(btnId, url) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      const orig = btn.textContent;
      btn.textContent = '...';
      btn.disabled = true;
      const a = document.createElement('a');
      a.href = url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 4000);
    }

    function exportPDFXlsx() { _exportCompact('btn-xlsx-executivo', `/reports/xlsx?lang=${_reportLang}`); }
    function exportDiarioXlsx() { _exportCompact('btn-xlsx-diario', `/reports/xlsx/daily?lang=${_reportLang}`); }
    function exportSemanalXlsx() { _exportCompact('btn-xlsx-semanal', `/reports/xlsx/weekly?lang=${_reportLang}`); }
    function exportProvinciaXlsx(folderId) {
      if (_submenuOpen) toggleProvinciaMenu();
      const a = document.createElement('a');
      a.href = `/reports/xlsx/provincia?folder_id=${folderId}&lang=${_reportLang}`;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    let _provinciasLoaded = false;
    let _submenuOpen = false;

    async function toggleProvinciaMenu() {
      _submenuOpen = !_submenuOpen;
      const submenu = document.getElementById('provincia-submenu');
      const chevron = document.getElementById('provincia-chevron');
      submenu.style.maxHeight = _submenuOpen ? '800px' : '0';
      chevron.style.transform = _submenuOpen ? 'rotate(180deg)' : '';

      if (_submenuOpen && !_provinciasLoaded) {
        try {
          const res = await fetch('/reports/folders');
          const folders = await res.json();
          const list = document.getElementById('provincia-list');
          if (!folders.length) {
            list.innerHTML = '<div class="px-3 py-1.5 text-xs text-gray-500">Nenhuma área encontrada</div>';
          } else {
            list.innerHTML = folders.map(f =>
              `<div class="flex items-center gap-1">
                <button onclick="exportProvincia('${f.folder_id}','${f.name.replace(/'/g, "\\'")}')"
                  class="flex-1 text-left px-3 py-1.5 text-xs text-gray-400 hover:text-white hover:bg-gray-800 rounded transition-colors">
                  ${f.name}
                </button>
                <button onclick="exportProvinciaXlsx('${f.folder_id}')" title="Exportar em Excel (.xlsx)"
                  class="shrink-0 px-1.5 py-1 mr-1 rounded text-[9px] font-bold text-gray-500 hover:bg-gray-800 hover:text-emerald-400 transition-colors">XLS</button>
              </div>`
            ).join('');
          }
          _provinciasLoaded = true;
        } catch (e) {
          document.getElementById('provincia-list').innerHTML =
            '<div class="px-3 py-1.5 text-xs text-red-400">Erro ao carregar</div>';
        }
      }
    }

    function exportProvincia(folderId) {
      if (_submenuOpen) toggleProvinciaMenu();
      _exportWithSpinner('btn-pdf-provincia', `/reports/pdf/provincia?folder_id=${folderId}&lang=${_reportLang}`);
    }
  </script>
</body>

</html>
