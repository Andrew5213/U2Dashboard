<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>U2 Broadcast — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-20 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <img src="/img/U2 Logo.png" alt="U2 Broadcast" class="h-12 w-auto shrink-0" />
        <div class="w-px h-5 bg-gray-200 shrink-0"></div>
        <nav id="breadcrumb" class="text-sm text-gray-500 truncate"></nav>
      </div>
      <div class="flex items-center gap-3 shrink-0">
        <div class="flex items-center gap-1.5 text-xs text-gray-400">
          <span id="sse-dot" class="w-2 h-2 rounded-full bg-gray-300 transition-colors"></span>
          <span id="sse-label">offline</span>
        </div>
        <span id="last-refresh" class="hidden sm:block text-xs text-gray-400"></span>
        <!-- PDF Diário -->
        <button onclick="exportDiario()" title="Exportar relatório diário de atualizações"
          class="text-xs bg-green-50 text-green-700 px-3 py-1.5 rounded-lg hover:bg-green-100 active:scale-95 transition-all font-medium flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
          </svg>
          PDF Diário
        </button>
        <!-- PDF Semanal -->
        <button onclick="exportSemanal()" title="Exportar relatório semanal de atualizações"
          class="text-xs bg-purple-50 text-purple-700 px-3 py-1.5 rounded-lg hover:bg-purple-100 active:scale-95 transition-all font-medium flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v11.25A2.25 2.25 0 0 0 6 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 0h1.5m-1.5 0v11.25A2.25 2.25 0 0 1 18 16.5h-2.25m-7.5 0h7.5m-7.5 0-1 3m8.5-3 1 3m0 0 .5 1.5m-.5-1.5h-9.5m0 0-.5 1.5m.75-9 3-3 2.148 2.148A12.061 12.061 0 0 1 16.5 7.605" />
          </svg>
          PDF Semanal
        </button>
        <!-- PDF Executivo -->
        <button onclick="exportPDF()" title="Exportar relatório executivo em PDF"
          class="text-xs bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg hover:bg-blue-100 active:scale-95 transition-all font-medium flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
          PDF Executivo
        </button>
        <!-- PDF Por Província (dropdown) -->
        <div class="relative" id="provincia-dropdown-wrapper">
          <button onclick="toggleProvinciaMenu()" id="provincia-btn"
            class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg hover:bg-indigo-100 active:scale-95 transition-all font-medium flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z" />
            </svg>
            PDF Província
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
            </svg>
          </button>
          <div id="provincia-menu" class="hidden absolute right-0 top-full mt-1 w-56 bg-white border border-gray-200 rounded-lg shadow-lg z-50 py-1 max-h-72 overflow-y-auto">
            <div id="provincia-list"><div class="px-3 py-2 text-xs text-gray-400">Carregando...</div></div>
          </div>
        </div>
        <button onclick="triggerRefresh()" id="refresh-btn"
          class="text-xs bg-red-50 text-red-700 px-3 py-1.5 rounded-lg hover:bg-red-100 active:scale-95 transition-all font-medium flex items-center gap-1.5">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
          <span id="refresh-label">Atualizar</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
    <div id="view">
      <div class="flex items-center justify-center h-64">
        <div class="flex flex-col items-center gap-3 text-gray-400">
          <svg class="animate-spin w-8 h-8" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
          </svg>
          <span class="text-sm">Carregando dashboard...</span>
        </div>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-5 right-5 z-50 hidden max-w-sm"></div>

  <script src="/static/sse.js?v=30"></script>
  <script src="/static/charts.js?v=30"></script>
  <script src="/static/app.js?v=30"></script>
  <script>
    function _exportWithSpinner(btnSelector, url) {
      const btn = document.querySelector(btnSelector);
      const orig = btn.innerHTML;
      const spinner = '<svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path></svg> Gerando...';
      btn.innerHTML = spinner;
      btn.disabled = true;
      const a = document.createElement('a');
      a.href = url;
      a.download = '';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 6000);
    }

    function exportPDF() { _exportWithSpinner('[onclick="exportPDF()"]', '/reports/pdf'); }
    function exportDiario() { _exportWithSpinner('[onclick="exportDiario()"]', '/reports/pdf/daily'); }
    function exportSemanal() { _exportWithSpinner('[onclick="exportSemanal()"]', '/reports/pdf/weekly'); }

    let _provinciasLoaded = false;
    async function toggleProvinciaMenu() {
      const menu = document.getElementById('provincia-menu');
      const isOpen = !menu.classList.contains('hidden');
      if (isOpen) { menu.classList.add('hidden'); return; }
      menu.classList.remove('hidden');
      if (!_provinciasLoaded) {
        try {
          const res = await fetch('/reports/folders');
          const folders = await res.json();
          const list = document.getElementById('provincia-list');
          if (!folders.length) {
            list.innerHTML = '<div class="px-3 py-2 text-xs text-gray-400">Nenhuma área encontrada</div>';
          } else {
            list.innerHTML = folders.map(f =>
              `<button onclick="exportProvincia('${f.folder_id}','${f.name.replace(/'/g,"\\'")}')"
                class="w-full text-left px-3 py-2 text-xs text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
                ${f.name}
              </button>`
            ).join('');
          }
          _provinciasLoaded = true;
        } catch(e) {
          document.getElementById('provincia-list').innerHTML = '<div class="px-3 py-2 text-xs text-red-500">Erro ao carregar</div>';
        }
      }
      document.addEventListener('click', function closeMenu(e) {
        if (!document.getElementById('provincia-dropdown-wrapper').contains(e.target)) {
          menu.classList.add('hidden');
          document.removeEventListener('click', closeMenu);
        }
      });
    }

    function exportProvincia(folderId, name) {
      document.getElementById('provincia-menu').classList.add('hidden');
      _exportWithSpinner('#provincia-btn', `/reports/pdf/provincia?folder_id=${folderId}`);
    }
  </script>
</body>
</html>
